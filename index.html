<!DOCTYPE html>
<html>
<head>
<title>Vehicle Registration</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* BODY */
body{
font-family:'Segoe UI', sans-serif;
margin:0;
padding:0;
background: linear-gradient(135deg, #1e3c72, #2a5298);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;

/* PAGE LOAD ANIMATION */
opacity:0;
animation:fadeIn 1s ease-in forwards;
}

@keyframes fadeIn{
to{opacity:1;}
}

/* CONTAINER */
.container{
width:90%;
max-width:450px;
background: rgba(255,255,255,0.1);
padding:25px;
border-radius:20px;
backdrop-filter: blur(10px);
box-shadow:0 8px 25px rgba(0,0,0,0.3);

/* FORM ANIMATION */
animation:slideUp 1s ease;
}

@keyframes slideUp{
from{transform:translateY(50px); opacity:0;}
to{transform:translateY(0); opacity:1;}
}

/* HEADING */
h2{
text-align:center;
color:white;
margin-bottom:20px;
animation:zoomIn 1s ease;
}

@keyframes zoomIn{
from{transform:scale(0.5); opacity:0;}
to{transform:scale(1); opacity:1;}
}

/* INPUT */
input{
width:100%;
padding:12px;
margin-top:5px;
margin-bottom:15px;
border:none;
border-radius:10px;
outline:none;
}

/* BUTTON */
button{
width:100%;
padding:14px;
background:#ff4b2b;
color:white;
border:none;
font-size:16px;
cursor:pointer;
border-radius:12px;
transition:0.3s;
}

/* BUTTON HOVER */
button:hover{
background:white;
color:#ff4b2b;
transform:scale(1.05);
}

/* BACK BUTTON (FLOATING) */
.back-btn{
position:fixed;
bottom:20px;
right:20px;
background:#00c6ff;
color:white;
padding:12px 18px;
border-radius:30px;
font-size:14px;
cursor:pointer;
box-shadow:0 5px 15px rgba(0,0,0,0.3);
transition:0.3s;
}

/* BACK BUTTON HOVER */
.back-btn:hover{
background:#0072ff;
transform:scale(1.1);
}

/* CLICK ANIMATION */
.back-btn:active{
transform:scale(0.9);
}

/* MOBILE */
@media(max-width:500px){
.container{
margin:20px;
}
}

</style>
</head>

<body>

<div class="container">

<h2>Register Your Erikshaw</h2>

<form id="jobForm">

<label>Owner Name</label>
<input type="text" name="name" required>

<label>Email</label>
<input type="email" name="email" required>

<label>Phone Number</label>
<input type="text" name="phone" required>

<label>Alt Phone</label>
<input type="text" name="adhar">

<label>Date of Registration</label>
<input type="date" name="dob">

<button type="submit">Submit Application</button>

</form>

</div>

<!-- BACK BUTTON -->
<button class="back-btn" onclick="window.open('https://jituloying1.github.io/pathaidemainmenue/')">⬅ Back</button>

<script>

/* BACK BUTTON FUNCTION WITH ANIMATION */
function goBack(){
    document.body.style.opacity = "0";
    document.body.style.transition = "0.5s";

    setTimeout(function(){
        window.history.back();
    }, 500);
}

/* FORM SUBMIT */
const scriptURL="https://script.google.com/macros/s/AKfycbyTMyosGRCbiOeI6OX1sepijsMkGzCHAASsylLUFWWQlSST4pEde055gER7_M0wbXDV/exec";

const form=document.getElementById("jobForm");

form.addEventListener("submit",e=>{
e.preventDefault();

let formData=new FormData(form);

fetch(scriptURL,{
method:"POST",
body:formData
})
.then(res=>res.text())
.then(data=>{
alert("Application Submitted Successfully 🚀");
form.reset();
})
.catch(error=>{
alert("Submission Error");
console.log(error);
});
});

</script>

</body>
</html>
